<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jorge Care</title>
  <meta name="description" content="Jorge Care — Composer, digital artist, and improviser." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --negro:  #0a0a0a;
      --blanco: #f0ede8;
      --gris:   #555552;
      --rojo:   #c0392b;
      --rojo2:  #e74c3c;
      --cian:   #00b8c8;
      --serif:  'Cormorant Garamond', Georgia, serif;
      --sans:   'Inter', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body {
      background-color: var(--negro);
      color: var(--blanco);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.7;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 3rem;
      background-color: rgba(10,10,10,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #1a1a1a;
    }
    nav .logo {
      font-family: var(--serif);
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--blanco);
      text-decoration: none;
    }
    nav .logo span { color: var(--rojo); }
    nav ul { list-style: none; display: flex; gap: 2rem; }
    nav a {
      text-decoration: none;
      color: var(--gris);
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 400;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--cian); }
    nav a.active { color: var(--blanco); }

    /* ── HERO ── */
    #inicio {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 3rem 5rem;
      position: relative;
      overflow: hidden;
    }

    /* Animated geometric background */
    .geo-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .geo-canvas svg {
      width: 100%;
      height: 100%;
    }

    /* Slow rotation on the triangle group */
    @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes spin-rev  { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
    @keyframes drift {
      0%   { transform: translate(0px, 0px) rotate(0deg); }
      33%  { transform: translate(14px, -8px) rotate(120deg); }
      66%  { transform: translate(-8px, 12px) rotate(240deg); }
      100% { transform: translate(0px, 0px) rotate(360deg); }
    }
    @keyframes pulse-opacity {
      0%, 100% { opacity: 0.18; }
      50%       { opacity: 0.35; }
    }
    @keyframes draw-line {
      from { stroke-dashoffset: 300; }
      to   { stroke-dashoffset: 0; }
    }
    @keyframes fade-in-hero {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .geo-ring-outer {
      transform-origin: 68% 42%;
      animation: spin-slow 90s linear infinite;
    }
    .geo-ring-inner {
      transform-origin: 68% 42%;
      animation: spin-rev 60s linear infinite;
    }
    .geo-tri-group {
      transform-origin: 72% 30%;
      animation: drift 40s ease-in-out infinite;
    }
    .geo-line-1 {
      stroke-dasharray: 300;
      animation: draw-line 4s ease-out forwards, pulse-opacity 12s ease-in-out 4s infinite;
    }
    .geo-line-2 {
      stroke-dasharray: 300;
      animation: draw-line 5s ease-out 0.5s forwards, pulse-opacity 14s ease-in-out 5.5s infinite;
    }
    .geo-dot { animation: pulse-opacity 8s ease-in-out infinite; }

    .hero-linea-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(to right, var(--rojo), var(--cian) 60%, transparent);
    }
    .hero-etiqueta {
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--rojo);
      margin-bottom: 1.5rem;
    }
    .hero-content {
      position: relative;
      z-index: 2;
      animation: fade-in-hero 1.2s ease-out forwards;
    }
    h1 {
      font-family: var(--serif);
      font-size: clamp(4rem, 11vw, 9rem);
      font-weight: 300;
      line-height: 0.92;
      letter-spacing: -0.02em;
      margin-bottom: 2rem;
      color: var(--blanco);
    }
    .hero-descripcion {
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gris);
      margin-bottom: 2.5rem;
    }
    .hero-descripcion span { color: var(--rojo); margin: 0 0.75rem; opacity: 0.7; }
    .hero-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      position: relative;
      z-index: 2;
    }
    .hero-location {
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #333;
    }
    .hero-location span { color: var(--cian); opacity: 0.7; }
    .hero-scroll {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gris);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    .hero-scroll::before {
      content: '';
      display: block;
      width: 1px;
      height: 3rem;
      background: linear-gradient(to bottom, transparent, var(--rojo));
    }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      nav ul { gap: 1.25rem; }
      #inicio { padding: 0 1.5rem 4rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">Jorge <span>Care</span></a>
    <ul>
      <li><a href="about.html">About</a></li>
      <li><a href="works.html">Works</a></li>
      <li><a href="concerts.html">Concerts</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <section id="inicio">
    <div class="hero-linea-top"></div>

    <!-- Geometric animated background -->
    <div class="geo-canvas" aria-hidden="true">
      <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
        <!-- Outer slow-rotating ring -->
        <g class="geo-ring-outer">
          <circle cx="816" cy="336" r="280" fill="none" stroke="#00b8c8" stroke-width="0.6" opacity="0.12"/>
          <circle cx="816" cy="336" r="320" fill="none" stroke="#c0392b" stroke-width="0.4" opacity="0.08"/>
          <!-- tick marks on outer ring -->
          <line x1="816" y1="16" x2="816" y2="36" stroke="#00b8c8" stroke-width="0.8" opacity="0.25"/>
          <line x1="816" y1="636" x2="816" y2="656" stroke="#00b8c8" stroke-width="0.8" opacity="0.25"/>
          <line x1="496" y1="336" x2="516" y2="336" stroke="#00b8c8" stroke-width="0.8" opacity="0.25"/>
          <line x1="1116" y1="336" x2="1136" y2="336" stroke="#00b8c8" stroke-width="0.8" opacity="0.25"/>
        </g>
        <!-- Inner counter-rotating ring -->
        <g class="geo-ring-inner">
          <circle cx="816" cy="336" r="180" fill="none" stroke="#f0ede8" stroke-width="0.4" opacity="0.05"/>
          <polygon points="816,156 964,486 668,486" fill="none" stroke="#c0392b" stroke-width="0.7" opacity="0.15"/>
        </g>
        <!-- Slowly drifting triangle group top-right -->
        <g class="geo-tri-group">
          <polygon points="864,80 920,180 808,180" fill="none" stroke="#00b8c8" stroke-width="1" opacity="0.2"/>
          <polygon points="864,100 900,160 828,160" fill="none" stroke="#00b8c8" stroke-width="0.5" opacity="0.12"/>
          <!-- cian dot at apex -->
          <circle cx="864" cy="80" r="2.5" fill="#00b8c8" opacity="0.5" class="geo-dot"/>
        </g>
        <!-- Static diagonal accent lines -->
        <line x1="0" y1="800" x2="400" y2="400" stroke="#1e1e1e" stroke-width="1" class="geo-line-1"/>
        <line x1="100" y1="800" x2="550" y2="200" stroke="#1e1e1e" stroke-width="0.5" class="geo-line-2"/>
        <!-- Corner cross-hairs -->
        <g opacity="0.2" stroke="#555552" stroke-width="0.6">
          <line x1="40" y1="80" x2="70" y2="80"/>
          <line x1="55" y1="65" x2="55" y2="95"/>
          <line x1="1140" y1="700" x2="1170" y2="700"/>
          <line x1="1155" y1="685" x2="1155" y2="715"/>
        </g>
        <!-- Cian accent dots scattered -->
        <circle cx="200" cy="650" r="1.5" fill="#00b8c8" opacity="0.4" class="geo-dot"/>
        <circle cx="950" cy="550" r="1.5" fill="#00b8c8" opacity="0.3" class="geo-dot"/>
        <circle cx="1050" cy="200" r="1"   fill="#c0392b" opacity="0.5" class="geo-dot"/>
      </svg>
    </div>

    <div class="hero-content">
      <p class="hero-etiqueta">Chile - Switzerland</p>
      <h1>Jorge<br>Care</h1>
      <p class="hero-descripcion">
        Composer <span>/</span> Digital artist <span>/</span> Improviser
      </p>
    </div>
    <div class="hero-bottom">
      <div class="hero-location">
        46°12'N <span>·</span> 6°09'E
      </div>
      <div class="hero-scroll">Scroll</div>
    </div>
  </section>

</body>
</html>
