<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jorge Care</title>
  <meta name="description" content="Jorge Care — Composer, digital artist, and improviser." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --negro:  #0a0a0a;
      --blanco: #f8f5f0;
      --gris:   #6b6b68;
      --rojo:   #e63946;
      --rojo2:  #ff4d5a;
      --cian:   #00d4e8;
      --serif:  'Cormorant Garamond', Georgia, serif;
      --sans:   'Inter', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body {
      background-color: var(--negro);
      color: var(--blanco);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.7;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 3rem;
      background-color: rgba(10,10,10,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #3a3a3a;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--blanco);
      text-decoration: none;
    }
    nav .logo span { color: var(--rojo); }
    nav ul { list-style: none; display: flex; gap: 2rem; }
    nav a {
      text-decoration: none;
      color: var(--gris);
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 400;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--cian); }
    nav a.active { color: var(--blanco); }

    /* ── HERO ── */
    #inicio {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 3rem 5rem;
      position: relative;
      overflow: hidden;
    }

    /* ── CANVAS BACKGROUND ── */
    .geo-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .geo-canvas canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── SCAN LINE OVERLAY ── */
    .scanlines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.04) 3px,
        rgba(0,0,0,0.04) 4px
      );
      z-index: 1;
    }

    /* ── CORNER HUD ELEMENTS ── */
    .hud-corner {
      position: absolute;
      pointer-events: none;
      z-index: 3;
    }
    .hud-tl { top: 5rem; left: 3rem; }
    .hud-tr { top: 5rem; right: 3rem; text-align: right; }
    .hud-bl { bottom: 5rem; left: 3rem; }
    .hud-label {
      font-size: 0.56rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #2e2e2e;
      line-height: 2;
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }
    .hud-label .accent { color: var(--cian); opacity: 0.55; }
    .hud-label .accent-r { color: var(--rojo); opacity: 0.55; }

    /* Corner bracket SVG */
    .hud-bracket {
      display: block;
      margin-bottom: 0.5rem;
    }
    .hud-tr .hud-bracket { margin-left: auto; }

    /* ── HERO TOP LINE ── */
    .hero-linea-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(to right, var(--rojo), var(--cian) 55%, transparent);
      z-index: 4;
    }
    /* Subtle left vertical accent */
    .hero-linea-left {
      position: absolute;
      top: 0; left: 0;
      width: 1px;
      height: 40vh;
      background: linear-gradient(to bottom, var(--rojo), transparent);
      z-index: 4;
    }

    /* ── HERO CONTENT ── */
    .hero-etiqueta {
      font-size: 0.65rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--rojo);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .hero-etiqueta::before {
      content: '';
      display: inline-block;
      width: 24px;
      height: 1px;
      background: var(--rojo);
      opacity: 0.7;
    }
    .hero-content {
      position: relative;
      z-index: 2;
      animation: fade-in-hero 1.4s ease-out forwards;
    }
    @keyframes fade-in-hero {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    h1 {
      font-family: var(--serif);
      font-size: clamp(3.2rem, 8.5vw, 7rem);
      font-weight: 300;
      line-height: 0.9;
      letter-spacing: -0.02em;
      margin-bottom: 2rem;
      color: var(--blanco);
      text-shadow: 0 0 80px rgba(0,212,232,0.08);
    }
    .hero-descripcion {
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #aaa;
    }
    .hero-descripcion span { color: var(--rojo); margin: 0 0.75rem; opacity: 0.8; }

    /* ── HERO BOTTOM ── */
    .hero-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      position: relative;
      z-index: 2;
    }
    .hero-location {
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #666;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      align-items: flex-end;
    }
    /* City label beside coord */
    .coord-city {
      color: #555;
      margin-right: 0.5rem;
    }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      nav ul { gap: 1.25rem; }
      #inicio { padding: 0 1.5rem 4rem; }
      .hud-tl, .hud-tr { display: none; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">Jorge <span>Care</span></a>
    <ul>
      <li><a href="about.html">About</a></li>
      <li><a href="works.html">Works</a></li>
      <li><a href="concerts.html">Concerts</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <section id="inicio">
    <div class="hero-linea-top"></div>
    <div class="hero-linea-left"></div>

    <!-- Animated canvas background -->
    <div class="geo-canvas" aria-hidden="true">
      <canvas id="bgCanvas"></canvas>
    </div>

    <!-- CRT scan-line texture -->
    <div class="scanlines" aria-hidden="true"></div>

    <!-- HUD corners -->
    <div class="hud-corner hud-tl" aria-hidden="true">
      <svg class="hud-bracket" width="22" height="22" viewBox="0 0 22 22">
        <path d="M1 22 L1 1 L22 1" fill="none" stroke="#e63946" stroke-width="1.2" opacity="0.5"/>
      </svg>
    </div>

    <div class="hud-corner hud-tr" aria-hidden="true">
      <svg class="hud-bracket" width="22" height="22" viewBox="0 0 22 22">
        <path d="M1 1 L22 1 L22 22" fill="none" stroke="#00d4e8" stroke-width="1.2" opacity="0.5"/>
      </svg>
    </div>

    <div class="hero-content">
      <p class="hero-etiqueta">Chile — Switzerland</p>
      <h1>Jorge<br>Care</h1>
      <p class="hero-descripcion">
        Composer <span>/</span> Digital artist <span>/</span> Improviser
      </p>
    </div>

    <div class="hero-bottom">
      <div style="flex:1"></div>
      <div class="hero-location-block">
        <div class="hero-location">
          <span class="coord-city">SCL</span>33°27'S <span>·</span> 70°40'W
        </div>
        <div class="hero-location">
          <span class="coord-city">GVA</span>46°12'N <span>·</span> 6°09'E
        </div>
      </div>
    </div>
  </section>

  <script>
  (function() {
    const canvas = document.getElementById('bgCanvas');
    const parent = canvas.parentElement;
    const ctx = canvas.getContext('2d');

    // Colors
    const CIAN  = { r:0,   g:212, b:232 };
    const ROJO  = { r:230, g:57,  b:70  };
    const WHITE = { r:248, g:245, b:240 };

    let W, H, t = 0, raf;

    function resize() {
      W = canvas.width  = parent.offsetWidth;
      H = canvas.height = parent.offsetHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // ── RINGS ──
    const rings = [
      { cx: 0.68, cy: 0.44, r: 0.28, speed:  0.0004, color: CIAN,  lw: 1.2, op: 0.55 },
      { cx: 0.68, cy: 0.44, r: 0.34, speed: -0.00025, color: ROJO, lw: 0.9, op: 0.40 },
      { cx: 0.68, cy: 0.44, r: 0.20, speed:  0.0007, color: WHITE, lw: 0.7, op: 0.28 },
      { cx: 0.68, cy: 0.44, r: 0.42, speed: -0.00015,color: CIAN,  lw: 0.5, op: 0.25 },
    ];

    // ── ORBITING PARTICLES on rings ──
    const orbiters = [
      { ringIdx:0, angle:0,    speed:0.0012,  size:3.0, color:CIAN,  op:1.0 },
      { ringIdx:0, angle:Math.PI, speed:0.0012, size:2.0, color:WHITE, op:0.85},
      { ringIdx:1, angle:1.2,  speed:-0.0008, size:2.5, color:ROJO,  op:1.0 },
      { ringIdx:1, angle:3.8,  speed:-0.0008, size:1.5, color:ROJO,  op:0.75 },
      { ringIdx:2, angle:0.5,  speed:0.002,   size:2.0, color:CIAN,  op:0.9 },
      { ringIdx:3, angle:2.1,  speed:-0.0005, size:1.5, color:CIAN,  op:0.65 },
    ];

    // ── DRIFTING TRIANGLES ──
    const triangles = [
      { cx:0.72, cy:0.12, r:60, angle:0, driftX:0, driftY:0, speed:0.0003, color:CIAN, lw:1.4, op:0.60 },
      { cx:0.72, cy:0.12, r:40, angle:Math.PI, driftX:0, driftY:0, speed:-0.0005, color:CIAN, lw:0.8, op:0.40 },
      { cx:0.20, cy:0.70, r:45, angle:0.3, driftX:0, driftY:0, speed:0.0004, color:ROJO, lw:1.1, op:0.45 },
      { cx:0.88, cy:0.75, r:30, angle:1.0, driftX:0, driftY:0, speed:-0.0003, color:WHITE, lw:0.7, op:0.30 },
    ];
    // give each triangle a drift offset
    triangles.forEach((tr, i) => {
      tr._phase = i * 1.3;
    });

    // ── GRID LINES (faint) ──
    function drawGrid() {
      ctx.save();
      ctx.strokeStyle = '#2e2e2e';
      ctx.lineWidth = 0.6;
      // subtle perspective grid bottom-left
      const vx = W * 0.1, vy = H * 0.9;
      const lines = 12;
      for (let i = 0; i <= lines; i++) {
        const px = (W * 0.05) + (W * 0.55) * (i / lines);
        ctx.beginPath();
        ctx.moveTo(px, H * 0.55);
        ctx.lineTo(vx + (px - vx) * 0.15, vy);
        ctx.stroke();
      }
      for (let j = 0; j <= 8; j++) {
        const t2 = j / 8;
        const y = H * 0.55 + (vy - H * 0.55) * t2;
        const xL = W * 0.05 + (vx - W * 0.05) * t2;
        const xR = W * 0.60 + (vx - W * 0.60) * t2;
        ctx.beginPath();
        ctx.moveTo(xL, y);
        ctx.lineTo(xR, y);
        ctx.stroke();
      }
      ctx.restore();
    }

    // ── IRREGULAR WAVEFORMS (3 passes per wave) ──
    // Each wave has base params; amplitude and frequency modulate over time
    // ── IRREGULAR WAVEFORMS — complex, inharmonic, electric ──
    const waves = [
      // cian, bottom zone — energetic + noisy
      { y: 0.84, baseAmp: 38, freqBase: 0.014, freqMod: 0.007,
        ampMod: 22, speed: 0.00022, speedMod: 0.00008,
        phase: 0, color: CIAN, lw: 1.4, op: 0.55 },
      // rojo, mid-low — jagged + inharmonic
      { y: 0.70, baseAmp: 30, freqBase: 0.021, freqMod: 0.012,
        ampMod: 28, speed: -0.00016, speedMod: 0.00012,
        phase: 1.2, color: ROJO, lw: 1.0, op: 0.40 },
      // white, mid — complex spectrum
      { y: 0.61, baseAmp: 20, freqBase: 0.028, freqMod: 0.016,
        ampMod: 32, speed: 0.00030, speedMod: -0.00006,
        phase: 2.6, color: WHITE, lw: 0.7, op: 0.25 },
      // second cian, upper-mid — sparse, erratic
      { y: 0.50, baseAmp: 14, freqBase: 0.010, freqMod: 0.018,
        ampMod: 26, speed: -0.00010, speedMod: 0.00007,
        phase: 4.1, color: CIAN, lw: 0.5, op: 0.20 },
    ];

    // Per-wave noise state for stochastic bursts
    waves.forEach((w, i) => {
      w._noisePhase = i * 2.7;
      w._burstTimer = Math.random() * 2;
      w._burstAmp = 0;
      w._burstDecay = 0;
    });

    function drawWave(wave, time) {
      const baseY = wave.y * H;

      // Stochastic burst: randomly adds a short noisy amplitude spike
      wave._burstTimer -= 0.016;
      if (wave._burstTimer <= 0) {
        wave._burstAmp   = 25 + Math.random() * 60;
        wave._burstDecay = 0.06 + Math.random() * 0.20;
        wave._burstTimer = 0.6 + Math.random() * 2.0;
      }
      wave._burstAmp *= (1 - 0.016 / Math.max(wave._burstDecay, 0.001));
      if (wave._burstAmp < 0.5) wave._burstAmp = 0;

      // Slowly varying noise seed
      const noiseBase = Math.sin(time * 1.37 + wave._noisePhase) *
                        Math.cos(time * 0.89 + wave._noisePhase * 1.6);

      ctx.save();
      ctx.beginPath();
      for (let x = 0; x <= W; x += 2) {
        const nx = x / W;

        const freq1 = wave.freqBase + wave.freqMod * Math.sin(time * 0.31 + wave.phase);
        const freq2 = freq1 * 1.618;  // golden ratio — inharmonic
        const freq3 = freq1 * 6.87;   // 7th harmonic — dissonant
        const freq4 = freq1 * 0.11;   // very slow envelope

        const amp1 = wave.baseAmp + wave.ampMod * Math.sin(time * 0.17 + wave.phase * 1.3);
        const amp2 = amp1 * 0.45;
        const amp3 = amp1 * 0.22 * (0.5 + 0.5 * Math.abs(noiseBase));
        const amp4 = amp1 * 0.30;

        const spd = wave.speed + wave.speedMod * Math.sin(time * 0.11);
        const T   = time * spd * 1000;

        // High-freq noisy term
        const noisy = Math.sin(nx * W * freq3 * 0.06 + T * 1.9 + wave._noisePhase)
                    * Math.cos(nx * W * freq3 * 0.041 + T * 2.3);

        // Localized burst spike
        const burstCenter = 0.3 + 0.4 * Math.abs(Math.sin(wave._noisePhase + time * 0.5));
        const burstShape  = wave._burstAmp
          * Math.exp(-Math.pow(nx - burstCenter, 2) * 18)
          * Math.sin(nx * W * 0.08 + T * 4.1);

        const y = baseY
          + amp1 * Math.sin(nx * W * freq1 * 0.06 + T)
          + amp2 * Math.sin(nx * W * freq2 * 0.06 + T * 1.3 + 1.1)
          + amp3 * noisy
          + amp4 * Math.sin(nx * W * freq4 * 0.06 + T * 0.3)
          + burstShape;

        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(${wave.color.r},${wave.color.g},${wave.color.b},${wave.op})`;
      ctx.lineWidth = wave.lw;
      ctx.stroke();
      ctx.restore();
    }

    // ── FLOATING DOTS ──
    const dots = Array.from({ length: 22 }, (_, i) => ({
      x: Math.random(),
      y: Math.random(),
      r: 0.8 + Math.random() * 1.6,
      color: i % 3 === 0 ? ROJO : i % 3 === 1 ? CIAN : WHITE,
      op: 0.25 + Math.random() * 0.55,
      phase: Math.random() * Math.PI * 2,
      freq: 0.0004 + Math.random() * 0.0008,
    }));

    // ── GLITCH ACCENT LINES — more aggressive, more frequent ──
    let glitchTimer = 0;
    let glitchLines = [];
    // Screen-tear glitch: displaces a horizontal strip of the canvas
    let tearTimer = 0;
    let tearActive = false;
    let tearY = 0, tearH2 = 0, tearShift = 0, tearLife = 0, tearMaxLife = 0;

    function spawnGlitch() {
      const count = 3 + Math.floor(Math.random() * 5);
      glitchLines = Array.from({ length: count }, () => ({
        x1: Math.random() * W * 0.7,
        y1: 0.2 * H + Math.random() * 0.6 * H,
        len: 30 + Math.random() * 200,
        angle: -Math.PI / 4 + (Math.random() - 0.5) * 1.2,
        color: Math.random() > 0.5 ? CIAN : ROJO,
        op: 0.5 + Math.random() * 0.5,
        life: 0, maxLife: 0.04 + Math.random() * 0.14,
      }));
    }

    // ── DRAW TRIANGLE ──
    function drawTriangle(cx, cy, r, angle, color, lw, op) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angle);
      ctx.beginPath();
      for (let i = 0; i < 3; i++) {
        const a = (i / 3) * Math.PI * 2 - Math.PI / 2;
        const px = Math.cos(a) * r;
        const py = Math.sin(a) * r;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.strokeStyle = `rgba(${color.r},${color.g},${color.b},${op})`;
      ctx.lineWidth = lw;
      ctx.stroke();
      ctx.restore();
    }

    // ── DRAW TICK MARKS ON RING ──
    function drawRingTicks(cx, cy, r, angle, color, op) {
      ctx.save();
      [0, Math.PI/2, Math.PI, Math.PI*1.5].forEach(a => {
        const ra = a + angle;
        const x1 = cx + Math.cos(ra) * (r - 8);
        const y1 = cy + Math.sin(ra) * (r - 8);
        const x2 = cx + Math.cos(ra) * (r + 8);
        const y2 = cy + Math.sin(ra) * (r + 8);
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.strokeStyle = `rgba(${color.r},${color.g},${color.b},${op * 1.5})`;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      });
      ctx.restore();
    }

    function draw(timestamp) {
      t = timestamp * 0.001;
      ctx.clearRect(0, 0, W, H);

      // Grid
      drawGrid();

      // Rings
      rings.forEach(rng => {
        const angle = t * rng.speed * 1000;
        const cx = rng.cx * W, cy = rng.cy * H, r = rng.r * Math.min(W, H);
        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(${rng.color.r},${rng.color.g},${rng.color.b},${rng.op})`;
        ctx.lineWidth = rng.lw;
        ctx.stroke();
        ctx.restore();
        drawRingTicks(cx, cy, r, angle, rng.color, rng.op);
      });

      // Inner polygon (rotates with ring 1)
      {
        const rng = rings[1];
        const angle = t * rng.speed * 1000;
        const cx = rng.cx * W, cy = rng.cy * H, r = rng.r * Math.min(W, H) * 0.75;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle);
        ctx.beginPath();
        for (let i = 0; i < 3; i++) {
          const a = (i / 3) * Math.PI * 2;
          if (i === 0) ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r);
          else ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
        }
        ctx.closePath();
        ctx.strokeStyle = `rgba(${ROJO.r},${ROJO.g},${ROJO.b},0.45)`;
        ctx.lineWidth = 0.9;
        ctx.stroke();
        ctx.restore();
      }

      // Orbiting particles
      orbiters.forEach(ob => {
        const rng = rings[ob.ringIdx];
        const angle = (ob.angle += ob.speed);
        const cx = rng.cx * W, cy = rng.cy * H;
        const r = rng.r * Math.min(W, H);
        const px = cx + Math.cos(angle) * r;
        const py = cy + Math.sin(angle) * r;
        ctx.save();
        ctx.beginPath();
        ctx.arc(px, py, ob.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${ob.color.r},${ob.color.g},${ob.color.b},${ob.op})`;
        ctx.fill();
        // glow
        ctx.beginPath();
        ctx.arc(px, py, ob.size * 3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${ob.color.r},${ob.color.g},${ob.color.b},0.06)`;
        ctx.fill();
        ctx.restore();
      });

      // Drifting triangles
      triangles.forEach(tr => {
        tr.angle += tr.speed;
        const driftX = 18 * Math.sin(t * 0.23 + tr._phase);
        const driftY = 12 * Math.cos(t * 0.17 + tr._phase * 1.2);
        drawTriangle(
          tr.cx * W + driftX, tr.cy * H + driftY,
          tr.r, tr.angle,
          tr.color, tr.lw, tr.op
        );
      });

      // Diagonal accent lines (left quadrant)
      ctx.save();
      ctx.strokeStyle = '#333333';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(0, H);
      ctx.lineTo(W * 0.35, H * 0.45);
      ctx.stroke();
      ctx.strokeStyle = '#282828';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(W * 0.05, H);
      ctx.lineTo(W * 0.48, H * 0.25);
      ctx.stroke();
      ctx.restore();

      // Waves
      waves.forEach(w => drawWave(w, t));

      // Floating dots
      dots.forEach(d => {
        const pulse = 0.5 + 0.5 * Math.sin(t * d.freq * 1000 + d.phase);
        ctx.save();
        ctx.beginPath();
        ctx.arc(d.x * W, d.y * H, d.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${d.color.r},${d.color.g},${d.color.b},${d.op * pulse})`;
        ctx.fill();
        ctx.restore();
      });

      // Crosshairs (corners)
      [[40, 80], [W - 40, H - 80]].forEach(([cx2, cy2]) => {
        ctx.save();
        ctx.strokeStyle = 'rgba(120,120,120,0.45)';
        ctx.lineWidth = 0.7;
        ctx.beginPath(); ctx.moveTo(cx2 - 14, cy2); ctx.lineTo(cx2 + 14, cy2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx2, cy2 - 14); ctx.lineTo(cx2, cy2 + 14); ctx.stroke();
        ctx.restore();
      });

      // Glitch lines — more frequent, more intense
      glitchTimer += 0.016;
      if (glitchTimer > (0.6 + Math.random() * 1.4)) {
        spawnGlitch();
        glitchTimer = 0;
      }
      glitchLines.forEach(gl => {
        gl.life += 0.016;
        if (gl.life < gl.maxLife) {
          const fade = 1 - gl.life / gl.maxLife;
          ctx.save();
          ctx.translate(gl.x1, gl.y1);
          ctx.rotate(gl.angle);
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(gl.len, 0);
          ctx.strokeStyle = `rgba(${gl.color.r},${gl.color.g},${gl.color.b},${gl.op * fade})`;
          ctx.lineWidth = 1.2;
          ctx.stroke();
          ctx.restore();
        }
      });

      // Screen-tear glitch — occasional horizontal strip displacement
      tearTimer += 0.016;
      if (tearTimer > (2.0 + Math.random() * 4.0) && !tearActive) {
        tearActive  = true;
        tearY       = H * (0.25 + Math.random() * 0.5);
        tearH2      = 4 + Math.random() * 18;
        tearShift   = (Math.random() > 0.5 ? 1 : -1) * (8 + Math.random() * 40);
        tearLife    = 0;
        tearMaxLife = 0.04 + Math.random() * 0.08;
        tearTimer   = 0;
      }
      if (tearActive) {
        tearLife += 0.016;
        if (tearLife < tearMaxLife) {
          const imageData = ctx.getImageData(0, tearY, W, tearH2);
          ctx.putImageData(imageData, tearShift, tearY);
          // Chromatic fringe on the tear edge
          ctx.save();
          ctx.strokeStyle = `rgba(${CIAN.r},${CIAN.g},${CIAN.b},0.5)`;
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(0, tearY); ctx.lineTo(W, tearY); ctx.stroke();
          ctx.strokeStyle = `rgba(${ROJO.r},${ROJO.g},${ROJO.b},0.4)`;
          ctx.beginPath(); ctx.moveTo(0, tearY + tearH2); ctx.lineTo(W, tearY + tearH2); ctx.stroke();
          ctx.restore();
        } else {
          tearActive = false;
        }
      }

      raf = requestAnimationFrame(draw);
    }

    raf = requestAnimationFrame(draw);
  })();
  </script>

</body>
