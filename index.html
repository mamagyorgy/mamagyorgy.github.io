<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jorge Care</title>
  <meta name="description" content="Jorge Care — Composer, digital artist, and improviser." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --negro:  #0a0a0a;
      --blanco: #f8f5f0;
      --gris:   #6b6b68;
      --rojo:   #e63946;
      --rojo2:  #ff4d5a;
      --cian:   #00d4e8;
      --serif:  'Cormorant Garamond', Georgia, serif;
      --sans:   'Inter', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body {
      background-color: var(--negro);
      color: var(--blanco);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.7;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 3rem;
      background-color: rgba(10,10,10,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #1a1a1a;
    }
    nav .logo {
      font-family: var(--serif);
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--blanco);
      text-decoration: none;
    }
    nav .logo span { color: var(--rojo); }
    nav ul { list-style: none; display: flex; gap: 2rem; }
    nav a {
      text-decoration: none;
      color: var(--gris);
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 400;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--cian); }
    nav a.active { color: var(--blanco); }

    /* ── HERO ── */
    #inicio {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 3rem 5rem;
      position: relative;
      overflow: hidden;
    }

    /* Animated geometric background */
    .geo-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .geo-canvas svg {
      width: 100%;
      height: 100%;
    }

    /* Slow rotation on the triangle group */
    @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes spin-rev  { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
    @keyframes drift {
      0%   { transform: translate(0px, 0px) rotate(0deg); }
      33%  { transform: translate(14px, -8px) rotate(120deg); }
      66%  { transform: translate(-8px, 12px) rotate(240deg); }
      100% { transform: translate(0px, 0px) rotate(360deg); }
    }
    @keyframes pulse-opacity {
      0%, 100% { opacity: 0.18; }
      50%       { opacity: 0.35; }
    }
    @keyframes draw-line {
      from { stroke-dashoffset: 300; }
      to   { stroke-dashoffset: 0; }
    }
    @keyframes fade-in-hero {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .geo-ring-outer {
      transform-origin: 68% 42%;
      animation: spin-slow 90s linear infinite;
    }
    .geo-ring-inner {
      transform-origin: 68% 42%;
      animation: spin-rev 60s linear infinite;
    }
    .geo-tri-group {
      transform-origin: 72% 30%;
      animation: drift 40s ease-in-out infinite;
    }
    .geo-line-1 {
      stroke-dasharray: 300;
      animation: draw-line 4s ease-out forwards, pulse-opacity 12s ease-in-out 4s infinite;
    }
    .geo-line-2 {
      stroke-dasharray: 300;
      animation: draw-line 5s ease-out 0.5s forwards, pulse-opacity 14s ease-in-out 5.5s infinite;
    }
    .geo-dot { animation: pulse-opacity 8s ease-in-out infinite; }

    .hero-linea-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(to right, var(--rojo), var(--cian) 60%, transparent);
    }
    .hero-etiqueta {
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--rojo);
      margin-bottom: 1.5rem;
    }
    .hero-content {
      position: relative;
      z-index: 2;
      animation: fade-in-hero 1.2s ease-out forwards;
    }
    h1 {
      font-family: var(--serif);
      font-size: clamp(4rem, 11vw, 9rem);
      font-weight: 300;
      line-height: 0.92;
      letter-spacing: -0.02em;
      margin-bottom: 2rem;
      color: var(--blanco);
    }
    .hero-descripcion {
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gris);
      margin-bottom: 2.5rem;
    }
    .hero-descripcion span { color: var(--rojo); margin: 0 0.75rem; opacity: 0.7; }
    .hero-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      position: relative;
      z-index: 2;
    }
    .hero-location {
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #333;
    }
    .hero-location span { color: var(--cian); opacity: 0.7; }
    .hero-location-block {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      align-items: flex-end;
    }

    @keyframes wave-shift {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes wave-shift-slow {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes wave-fade {
      0%, 100% { opacity: 0.18; }
      50%       { opacity: 0.38; }
    }
    .geo-wave-1 {
      animation: wave-shift 18s linear infinite, wave-fade 9s ease-in-out infinite;
    }
    .geo-wave-2 {
      animation: wave-shift-slow 28s linear infinite, wave-fade 12s ease-in-out 3s infinite;
    }
    .geo-wave-3 {
      animation: wave-shift 22s linear infinite reverse, wave-fade 10s ease-in-out 6s infinite;
    }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      nav ul { gap: 1.25rem; }
      #inicio { padding: 0 1.5rem 4rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">Jorge <span>Care</span></a>
    <ul>
      <li><a href="about.html">About</a></li>
      <li><a href="works.html">Works</a></li>
      <li><a href="concerts.html">Concerts</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <section id="inicio">

    <!-- Geometric animated background -->

        <!-- Outer slow-rotating ring -->
        <g class="geo-ring-outer">

          <circle cx="816" cy="336" r="320" fill="none" stroke="#e63946" stroke-width="0.4" opacity="0.1"/>
          <!-- tick marks on outer ring -->
          <line x1="816" y1="16" x2="816" y2="36" stroke="#00d4e8" stroke-width="0.8" opacity="0.3"/>
          <line x1="816" y1="636" x2="816" y2="656" stroke="#00d4e8" stroke-width="0.8" opacity="0.3"/>
          <line x1="496" y1="336" x2="516" y2="336" stroke="#00d4e8" stroke-width="0.8" opacity="0.3"/>
          <line x1="1116" y1="336" x2="1136" y2="336" stroke="#00d4e8" stroke-width="0.8" opacity="0.3"/>
        </g>
        <!-- Inner counter-rotating ring -->
        <g class="geo-ring-inner">
          <circle cx="816" cy="336" r="180" fill="none" stroke="#f8f5f0" stroke-width="0.4" opacity="0.06"/>
          <polygon points="816,156 964,486 668,486" fill="none" stroke="#e63946" stroke-width="0.7" opacity="0.18"/>

        <!-- Slowly drifting triangle group top-right -->

          <polygon points="864,100 900,160 828,160" fill="none" stroke="#00d4e8" stroke-width="0.5" opacity="0.15"/>
          <!-- cian dot at apex -->
          <circle cx="864" cy="80" r="2.5" fill="#00d4e8" opacity="0.6" class="geo-dot"/>
        </g>
        <!-- Static diagonal accent lines -->
        <line x1="0" y1="800" x2="400" y2="400" stroke="#1e1e1e" stroke-width="1" class="geo-line-1"/>
        <line x1="100" y1="800" x2="550" y2="200" stroke="#1e1e1e" stroke-width="0.5" class="geo-line-2"/>
        <!-- Corner cross-hairs -->
        <g opacity="0.2" stroke="#555552" stroke-width="0.6">
          <line x1="40" y1="80" x2="70" y2="80"/>

        <!-- Cian accent dots scattered -->
        <circle cx="200" cy="650" r="1.5" fill="#00d4e8" opacity="0.4" class="geo-dot"/>
        <circle cx="950" cy="550" r="1.5" fill="#00d4e8" opacity="0.3" class="geo-dot"/>
        <circle cx="1050" cy="200" r="1"   fill="#e63946" opacity="0.5" class="geo-dot"/>

        <!-- Animated sinusoidal waves – bottom-left zone -->
        <!-- Wave 1: cian, gentle sine, lower area -->
        <g class="geo-wave-1" style="overflow:visible">
          <path d="M-1200,680 C-1140,655 -1080,705 -1020,680 C-960,655 -900,705 -840,680
                   C-780,655 -720,705 -660,680 C-600,655 -540,705 -480,680

                   C300,655 360,705 420,680 C480,655 540,705 600,680
                   C660,655 720,705 780,680 C840,655 900,705 960,680
                   C1020,655 1080,705 1140,680 C1200,655 1260,705 1320,680
                   C1380,655 1440,705 1500,680 C1560,655 1620,705 1680,680
                   C1740,655 1800,705 1860,680 C1920,655 1980,705 2040,680
                   C2100,655 2160,705 2220,680 C2280,655 2340,705 2400,680"
                fill="none" stroke="#00d4e8" stroke-width="0.9" opacity="0.22"/>
        </g>
        <!-- Wave 2: rojo, tighter frequency, mid-lower area -->
        <g class="geo-wave-2" style="overflow:visible">
          <path d="M-1200,590 C-1110,558 -1020,622 -930,590 C-840,558 -750,622 -660,590
                   C-570,558 -480,622 -390,590 C-300,558 -210,622 -120,590
                   C-30,558 60,622 150,590 C240,558 330,622 420,590
                   C510,558 600,622 690,590 C780,558 870,622 960,590
                   C1050,558 1140,622 1230,590 C1320,558 1410,622 1500,590
                   C1590,558 1680,622 1770,590 C1860,558 1950,622 2040,590
                   C2130,558 2220,622 2310,590 C2400,558 2490,622 2580,590"
                fill="none" stroke="#e63946" stroke-width="0.7" opacity="0.14"/>
        </g>
        <!-- Wave 3: blanco, complex/irregular shape, mid area -->
        <g class="geo-wave-3" style="overflow:visible">
          <path d="M-1200,520 C-1170,505 -1140,498 -1110,520 C-1080,542 -1050,560 -1020,520
                   C-990,480 -960,495 -930,520 C-900,545 -870,558 -840,520
                   C-810,482 -780,497 -750,520 C-720,543 -690,556 -660,520
                   C-630,484 -600,499 -570,520 C-540,541 -510,554 -480,520
                   C-450,486 -420,501 -390,520 C-360,539 -330,552 -300,520
                   C-270,488 -240,503 -210,520 C-180,537 -150,550 -120,520
                   C-90,490 -60,505 -30,520 C0,535 30,548 60,520
                   C90,492 120,507 150,520 C180,533 210,546 240,520
                   C270,494 300,509 330,520 C360,531 390,544 420,520
                   C450,496 480,511 510,520 C540,529 570,542 600,520
                   C630,498 660,513 690,520 C720,527 750,540 780,520
                   C810,500 840,515 870,520 C900,525 930,538 960,520
                   C990,502 1020,517 1050,520 C1080,523 1110,536 1140,520
                   C1170,504 1200,519 1230,520 C1260,521 1290,534 1320,520
                   C1350,506 1380,521 1410,520 C1440,519 1470,532 1500,520
                   C1530,508 1560,523 1590,520 C1620,517 1650,530 1680,520
                   C1710,510 1740,525 1770,520 C1800,515 1830,528 1860,520
                   C1890,512 1920,527 1950,520 C1980,513 2010,526 2040,520
                   C2070,514 2100,527 2130,520 C2160,513 2190,526 2220,520
                   C2250,514 2280,527 2310,520 C2340,513 2370,526 2400,520"
                fill="none" stroke="#f8f5f0" stroke-width="0.5" opacity="0.09"/>
        </g>
      </svg>
    </div>

    <div class="hero-content">
      <p class="hero-etiqueta">Chile - Switzerland</p>
      <h1>Jorge<br>Care</h1>
      <p class="hero-descripcion">
        Composer <span>/</span> Digital artist <span>/</span> Improviser
      </p>
    </div>
    <div class="hero-bottom">
      <div style="flex:1"></div>
      <div class="hero-location-block">
        <div class="hero-location">
          33°27'S <span>·</span> 70°40'W
        </div>
        <div class="hero-location">
          46°12'N <span>·</span> 6°09'E
        </div>
      </div>
    </div>
  </section>

</body>
</html>
